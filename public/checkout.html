<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culinary Checkout | Luxe Royal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background-color: #f8f9fa;">

    <nav class="navbar navbar-expand-lg navbar-dark position-absolute w-100" style="z-index: 1000; background: rgba(10,25,47,0.1) !important;">
        <div class="container">
            <a class="navbar-brand brand-logo fs-3" href="index.html" style="color:var(--accent-color);">Luxe</a>
             <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="rooms.html">Rooms</a></li>
                    <li class="nav-item"><a class="nav-link" href="menu.html">Dining</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Header with Cinematic Video -->
    <div class="page-header position-relative" style="overflow: hidden; padding: 120px 0; color: white; text-align: center;">
        <video autoplay muted loop playsinline class="video-bg" style="position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); z-index: -2;">
            <source src="https://assets.mixkit.co/videos/preview/mixkit-top-view-of-a-luxury-hotel-pool-and-surroundings-4114-large.mp4" type="video/mp4">
        </video>
        <div class="video-overlay" style="position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(10,25,47,0.6); z-index: -1;"></div>
        <div class="container position-relative z-1">
            <h1 class="display-4 brand-logo" style="color:var(--accent-color);">Culinary Checkout</h1>
            <p class="lead">Finalize your royal feast.</p>
        </div>
    </div>
        
        <div class="row g-5">
            <!-- Delivery Form -->
            <div class="col-md-7">
                <div class="card border-0 shadow-sm p-4">
                    <h4 class="brand-logo mb-4" style="color:var(--primary-color);">Service Details</h4>
                    <form id="checkout-form">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label text-uppercase small fw-bold text-muted">First Name</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-uppercase small fw-bold text-muted">Last Name</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="col-12 mt-4">
                                <label class="form-label text-uppercase small fw-bold text-muted">Delivery Type</label>
                                <select class="form-select" required>
                                    <option value="in-room">In-Room Dining (Current Guests)</option>
                                    <option value="restaurant">Reserve Table for Arrival</option>
                                </select>
                            </div>
                            <div class="col-12 mt-3">
                                <label class="form-label text-uppercase small fw-bold text-muted">Room Number or Expected Arrival Time</label>
                                <input type="text" class="form-control" placeholder="e.g. Suite 402 or 8:30 PM" required>
                            </div>
                        </div>
                        <hr class="my-4">
                        <button class="btn btn-primary-custom w-100 btn-lg btn-dark text-white border-0" style="background-color: var(--primary-color);" type="submit">Place Order Securely</button>
                    </form>
                </div>
            </div>

            <!-- Cart Summary -->
            <div class="col-md-5">
                <div class="card border-0 shadow-sm p-4" style="background-color: white;">
                    <h4 class="brand-logo mb-4" style="color:var(--primary-color);">Your Royal Cart</h4>
                    <div id="checkout-items">
                        <!-- Populated by app.js loadCheckout() -->
                    </div>
                    <hr class="mt-4">
                    <div class="d-flex justify-content-between">
                        <h4 class="brand-logo m-0">Grand Total</h4>
                        <h4 class="brand-logo m-0" style="color:var(--accent-color);" id="checkout-total">₹0.00</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center text-lg-start bg-dark pt-5 mt-5">
        <div class="text-center p-3" style="background-color: rgba(0, 0, 0, 0.5); color:white;">
            © 2026 Luxe Royal Hotel & Resort
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
