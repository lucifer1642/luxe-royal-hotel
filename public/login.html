<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Login | Luxe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 40px;
            background-color: white;
            margin-top: 100px;
            margin-bottom: 100px;
        }
        .form-control {
            border-radius: 0;
            border: none;
            border-bottom: 2px solid #ddd;
            padding-left: 0;
            background-color: transparent;
        }
        .form-control:focus {
            box-shadow: none;
            border-bottom-color: var(--accent-color);
            background-color: transparent;
        }
    </style>
</head>
<body style="background: linear-gradient(rgba(10, 25, 47, 0.4), rgba(10, 25, 47, 0.4)), url('https://images.unsplash.com/photo-1551882547-ff40c0d13c05?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover fixed;">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark position-absolute w-100" style="z-index: 1000; background: rgba(10,25,47,0.1) !important;">
        <div class="container">
            <a class="navbar-brand brand-logo fs-3" href="index.html" style="color:var(--accent-color);">Luxe</a>
             <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Back to Home</a></li>
            </ul>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="login-card">
                    <h2 class="brand-logo text-center mb-4" style="color:var(--primary-color);">Guest Login</h2>
                    <p class="text-center text-muted mb-5">Sign in to manage your bookings and view exclusive offers.</p>
                    
                    <form id="login-form">
                        <div class="mb-4">
                            <label class="form-label text-muted small text-uppercase fw-bold">Email Address</label>
                            <input type="email" class="form-control" required>
                        </div>
                        <div class="mb-5">
                            <label class="form-label text-muted small text-uppercase fw-bold">Password</label>
                            <input type="password" class="form-control" required>
                        </div>
                        
                        <div class="text-center mb-3">
                            <button type="submit" class="btn btn-primary-custom w-100 btn-lg">Sign In</button>
                        </div>
                        
                        <p class="text-center text-muted small">
                            Don't have an account? <a href="#" class="text-decoration-none" style="color:var(--accent-color);">Register here</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
